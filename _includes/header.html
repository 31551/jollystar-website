<header id="pc-header">
    <div class="container">
        <div class="header-inner">
            <div class="logo">
                <a href="{{ '/' | relative_url }}">
                    <img src="{{ '/assets/images/logo.png' | relative_url }}" alt="{{ site.short_title }}">
                </a>
            </div>
            <button class="nav-toggle" id="navToggle" aria-label="菜单">
                <span></span><span></span><span></span>
            </button>
            <nav class="main-nav" id="mainNav">
                <ul>
                    <li{% if page.url == '/' %} class="active"{% endif %}>
                        <a href="{{ '/' | relative_url }}">首页</a>
                    </li>
                    <li class="has-children">
                        <a href="{{ '/products/' | relative_url }}">产品展示 <span class="arrow">▾</span></a>
                        <ul class="sub-menu">
                            <li><a href="{{ '/products/1064nm/' | relative_url }}">1064nm场镜</a></li>
                            <li><a href="{{ '/products/355nm/' | relative_url }}">355nm场镜</a></li>
                            <li><a href="{{ '/products/532nm/' | relative_url }}">532nm场镜</a></li>
                            <li><a href="{{ '/products/focus/' | relative_url }}">聚焦镜头</a></li>
                            <li><a href="{{ '/products/custom/' | relative_url }}">定制镜头</a></li>
                            <li><a href="{{ '/products/accessories/' | relative_url }}">周边配件</a></li>
                            <li><a href="{{ '/products/others/' | relative_url }}">其它波长镜头</a></li>
                        </ul>
                    </li>
                    <li class="has-children">
                        <a href="{{ '/news/' | relative_url }}">新闻动态 <span class="arrow">▾</span></a>
                        <ul class="sub-menu">
                            <li><a href="{{ '/events/' | relative_url }}">公司动态</a></li>
                            <li><a href="{{ '/industry/' | relative_url }}">行业资讯</a></li>
                        </ul>
                    </li>
                    <li class="has-children">
                        <a href="{{ '/about/' | relative_url }}">关于我们 <span class="arrow">▾</span></a>
                        <ul class="sub-menu">
                            <li><a href="{{ '/about/' | relative_url }}">公司简介</a></li>
                            <li><a href="{{ '/careers/' | relative_url }}">工作机会</a></li>
                        </ul>
                    </li>
                    <li><a href="{{ '/contact/' | relative_url }}">联系我们</a></li>
                </ul>
            </nav>
        </div>
    </div>
</header>
